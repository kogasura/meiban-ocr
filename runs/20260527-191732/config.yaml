data:
  root: data/recognition
model:
  num_classes: 37
  rnn_hidden: 128
  rnn_layers: 2
  dropout: 0.1
train:
  batch_size: 64
  epochs: 30
  lr_backbone: 0.0001
  lr_head: 0.001
  weight_decay: 0.0001
  num_workers: 4
  freeze_backbone_epochs: 2
  early_stopping_patience: 15
runtime:
  device: cpu
  seed: 42
output:
  runs_dir: runs
