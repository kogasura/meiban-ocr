[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "meiban-ocr-trainer"
version = "0.0.0"
description = "PyTorch training side for meiban-ocr."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Yuuki Okubo" }]
dependencies = [
  "torch>=2.1",
  "torchvision>=0.16",
  "numpy>=1.26",
  "opencv-python>=4.9",
  "pillow>=10.0",
  "albumentations>=1.4",
  "pyyaml>=6.0",
  "tqdm>=4.66",
]

[project.optional-dependencies]
export = [
  "onnx>=1.16",
  "onnxruntime>=1.18",
  "onnxsim>=0.4.36",
]
metrics = [
  "torchmetrics>=1.3",
]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "ruff>=0.5",
]

[project.scripts]
meiban-ocr-train = "meiban_ocr_trainer.train:main"
meiban-ocr-eval = "meiban_ocr_trainer.evaluate:main"
meiban-ocr-export = "meiban_ocr_trainer.export:main"

[tool.hatch.build.targets.wheel]
packages = ["src/meiban_ocr_trainer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
