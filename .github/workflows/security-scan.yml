name: Security Scan

# Why: 過去 review (Iter2 v2 #2, Iter3 v3 #2/#4, Iter4 v4 #2/#3) で
# Ericsson 実シリアル形式 (^E[39]\d{2}MM\d{6}$) が source code / annotations / commit
# message に混入する事故が発生。本 workflow で正規表現 lint を回し、
# `E300MM` 系の dummy 以外の real-pattern serial が tracked file に出現したら fail。
#
# 許容パターン:
#   - `E300MM\d{6}` (dummy range) は常に許容、それ以外は無条件で fail。
#
# Iter5 v5 #1 fix: 旧版は `grep -v 'noqa: serial-check'` の行マーカー除外を持っていたが、
#   攻撃者が任意行に `# noqa: serial-check` を書くだけで scan を bypass できる構造
#   だったため撤去。現状 repo 内に noqa 行は 1 件も無く、副作用ゼロ。
#   将来例外が必要になったら **ファイル単位 allowlist** (例: `.github/serial-allow.txt`)
#   を導入する (行マーカーよりも diff が監査しやすい)。
#
# 検出ロジック (Iter4 v4 #3 fix): 行単位 `grep -v` だと dummy と real-looking が
# 同じ行に co-located されると bypass されるため、Python で **各 match 単位** に
# 分解して E300MM 以外を抽出する。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secscan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  serial-leak-scan:
    name: Real-pattern serial leak scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # PR の差分も含めて全 commit を見る

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Write per-match scanner script
        # Why: Python heredoc を YAML block scalar に埋め込むと indent 制約で
        # 破綻するため、external file として用意する。
        run: |
          set -euo pipefail
          mkdir -p /tmp/secscan
          cat > /tmp/secscan/extract.py <<'PYEOF'
          import re, sys
          for line in sys.stdin:
              line = line.rstrip()
              serials = re.findall(r"E[39][0-9]{2}MM[0-9]{6}", line)
              # E300MM ダミー以外の serial が 1 つでもあれば report
              if any(not s.startswith("E300MM") for s in serials):
                  print(line)
          PYEOF

      - name: Scan tracked files for real-pattern Ericsson serials
        run: |
          set -euo pipefail
          echo "Scanning for E[39]\d{2}MM\d{6} matches not in E300MM dummy range..."

          # 検索対象拡張子 (Iter4 v4 #6 fix: .mjs/.cjs/.pyi も追加)
          PATTERNS='\.(py|pyi|ts|tsx|js|mjs|cjs|json|yaml|yml|md|toml|html|css|sh)$'

          MATCHES=$(
            git ls-files \
              | grep -E "$PATTERNS" \
              | xargs grep -HnE 'E[39][0-9]{2}MM[0-9]{6}' 2>/dev/null \
              | python3 /tmp/secscan/extract.py \
              || true
          )

          if [ -n "$MATCHES" ]; then
            echo "::error::Real-pattern Ericsson serial detected in tracked files:"
            echo "$MATCHES"
            echo ""
            echo "Policy: only 'E300MM\d{6}' is allowed as dummy serial."
            echo "If this is a real customer serial, redact it (see SECURITY.md)."
            echo "If you need to commit other Ericsson-pattern strings, use file allowlist"
            echo "(see security-scan.yml header comment for the migration plan)."
            exit 1
          fi
          echo "OK: no real-pattern serials found."

      - name: Scan text_visible fields in annotations for digit leaks
        run: |
          set -euo pipefail
          # annotations/*.json の text_visible は LABELING.md で「リアル数字禁止」と定義。
          # Python loader (annotation.py の Region.__post_init__) でも弾くが、
          # CI でも JSON ファイルレベルでチェック。
          if git ls-files annotations/ > /dev/null 2>&1; then
            BAD=$(
              git ls-files annotations/ \
                | xargs grep -HnE '"text_visible"[[:space:]]*:[[:space:]]*"[^"]*[0-9]{5,}' 2>/dev/null \
                || true
            )
            if [ -n "$BAD" ]; then
              echo "::error::text_visible contains 5+ consecutive digits:"
              echo "$BAD"
              echo "Policy: text_visible は public commit に含まれるためリアル数字は不可。"
              echo "  例: '(handwritten digits, redacted)' のように redact 表記を使う。"
              exit 1
            fi
          fi
          echo "OK: no leaky text_visible fields."
